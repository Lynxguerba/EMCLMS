<!DOCTYPE html>
<html>
  <head>
    <title>Password Reset Requests Report</title>
    <style>
      table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 24px;
      }
      th,
      td {
        border: 1px solid #333;
        padding: 4px 8px;
        font-size: 12px;
      }
      th {
        background: #94a5ff;
      }
      h1 {
        margin-top: 32px;
      }
    </style>
  </head>
  <body>
    <h1>Password Reset Requests</h1>
    <table>
      <tr>
        <th style="width: 15%">Reset ID</th>
        <th style="width: 15%">User ID</th>
        <th style="width: 60%">Email</th>
        <th style="width: 20%">Status</th>
      </tr>
      {% for r in password_resets %}
      <tr>
        <td>{{ r.password_reset_id }}</td>
        <td>{{ r.user_id }}</td>
        <td>{{ r.email|safe }}</td>
        <td>{{ r.status }}</td>
      </tr>
      {% endfor %}
    </table>
  </body>
</html>
